<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Soul School — A new educational playground for the future human.">
  <meta name="theme-color" content="#0A0A08">
  <title>Soul School Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="../styles/what-is-soul-school.css">
</head>
<script>
  if (!sessionStorage.getItem('soulschool_auth')) {
    window.location.replace('enter.html');
  }
</script>
<body>

  <!-- ── Top navigation ── -->
  <nav class="site-nav">
    <a href="../index.html" class="site-nav-logo">Soul School</a>
    <span class="wearefree-tag">WEAREFREE</span>
  </nav>

  <!-- ── Hero heading ── -->
  <section class="wiss-hero">
    <h1 class="wiss-heading">You don't need more information.</h1>
    <p class="wiss-subheading">The best way to understand Soul School is STILL to show up.</p>
  </section>

  <!-- ── Upcoming events ── -->
  <section class="wiss-events">
    <div class="event-cards" id="portal-event-cards">
      <!-- Populated by scripts/calendar-embed.js after WEAREFREE auth -->
    </div>
  </section>

  <!-- ── Carousel ── -->
  <!-- Carousel: images will load from assets/carousel-images/ -->
  <section class="wiss-carousel-section">
    <div class="wiss-carousel" id="wiss-carousel">
      <!-- Placeholder boxes — replace with <img src="../assets/carousel-images/filename.jpg"> -->
      <img src="../assets/Carousel-img/wearefreetoday-grass.jpg" alt="Soul School community gathering" class="carousel-image">
      <div class="carousel-placeholder-box">Image 2</div>
      <div class="carousel-placeholder-box">Image 3</div>
      <div class="carousel-placeholder-box">Image 4</div>
      <div class="carousel-placeholder-box">Image 5</div>
    </div>
  </section>

  <!-- ── YouTube embed ── -->
  <section class="wiss-video-section">
    <div class="wiss-video-wrap">
      <iframe
        class="wiss-video-iframe"
        src="https://www.youtube.com/embed/OdUoW1oihdQ"
        title="Soul School video"
        frameborder="0"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
        allowfullscreen
      ></iframe>
    </div>
    <p class="wiss-video-credit">By AJ Terio</p>
  </section>

  <!-- ── We Are Free image ── -->
  <section class="wiss-wearefree-section">
    <img
      src="../assets/We-are-free-GOLD.png"
      alt="We Are Free — Soul School community"
      class="wiss-wearefree-img"
    >
  </section>

  <!-- ── SoundCloud ── -->
  <!-- TODO: SoundCloud embed — paste iframe here -->

  <!-- ── Book a Call ── -->
  <section class="wiss-booking-section">
    <h2 class="wiss-booking-prompt">If you are ready, let us talk.</h2>
    <!-- TODO: Replace href with actual booking link -->
    <a href="#" class="btn-pill wiss-booking-btn">Book a Call</a>
  </section>

  <!-- ── Footer ── -->
  <footer class="site-footer">
    <span class="site-footer-logo">Soul School</span>
    <span class="site-footer-copy">© 2025 Soul School</span>
  </footer>

  <script src="../scripts/calendar-embed.js"></script>
  <script>
    // Calendar loads immediately — auth guard at top of page already
    // confirmed the WEAREFREE password was entered this session.
    document.addEventListener('DOMContentLoaded', function () {
      initPortalCalendar('portal-event-cards', 6);
    });
  </script>

</body>
</html>
