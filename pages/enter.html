<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0A0A08">
  <title>Enter Soul School</title>
  <meta name="description" content="Enter Soul School. Access is shared with those who show up.">
  <meta property="og:title" content="Enter Soul School">
  <meta property="og:url" content="https://soulschool.live/pages/enter.html">
  <meta property="og:type" content="website">
  <meta property="og:image" content="https://soulschool.live/assets/SOUL-SCHOOL-HEADER-GOLD.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="../styles/enter.css">
</head>
<body>

  <nav class="site-nav">
    <a href="../index.html" class="site-nav-logo">Soul School</a>
    <span class="wearefree-tag">WEAREFREE</span>
  </nav>

  <main class="enter-main">

    <div class="access-form">
      <input
        type="password"
        id="access-code"
        class="access-input"
        placeholder="Enter access code"
      >
      <button class="btn-pill" onclick="checkPassword()">Enter</button>
    </div>

    <div id="error-msg" class="enter-error">
      That's not the code. Attend a gathering to receive access.
    </div>

  </main>

  <!-- TODO: Future video + animation with soundtrack goes here -->

  <!-- TODO: Move password validation to server-side before launch for real security -->
  <script>
    function checkPassword() {
      const input = document.getElementById('access-code').value.trim().toUpperCase();
      const error = document.getElementById('error-msg');
      if (input === 'WEAREFREE') {
        sessionStorage.setItem('soulschool_auth', 'true');
        sessionStorage.setItem('soulschool_entry_date', new Date().toISOString());
        window.location.href = 'soul-school-portal.html';
      } else {
        error.style.display = 'block';
      }
    }

    document.getElementById('access-code').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') checkPassword();
    });
  </script>

</body>
</html>
