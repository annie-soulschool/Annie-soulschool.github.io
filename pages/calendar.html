<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Soul School · Gatherings</title>
  <link rel="stylesheet" href="../styles/main.css">
  <link rel="stylesheet" href="../styles/calendar.css">
</head>
<body>

  <div class="bg-layer" aria-hidden="true"></div>

  <main class="calendar-page">

    <header class="cal-header">
      <span class="eyebrow">Come as you are</span>
      <h1>Gatherings</h1>
      <span class="gold-rule"></span>
      <p class="cal-intro">Events are the doorway. Show up and see what opens.</p>
    </header>

    <!-- ── Month navigation ── -->
    <div class="month-nav">
      <button class="month-btn" id="btn-prev" aria-label="Previous month">&#8592;</button>
      <h2 class="month-label" id="month-label">Month Year</h2>
      <button class="month-btn" id="btn-next" aria-label="Next month">&#8594;</button>
    </div>

    <!-- ── Calendar grid ── -->
    <div class="cal-grid-wrapper">
      <div class="cal-weekdays" aria-hidden="true">
        <span>Sun</span><span>Mon</span><span>Tue</span>
        <span>Wed</span><span>Thu</span><span>Fri</span><span>Sat</span>
      </div>
      <div class="cal-grid" id="cal-grid" role="grid" aria-label="Calendar"></div>
    </div>

    <!-- ── Upcoming events list ── -->
    <section class="events-section">
      <span class="eyebrow">Upcoming</span>
      <div class="events-list" id="events-list">
        <!-- Populated by JS -->
      </div>
    </section>

    <!-- ── Event detail modal ── -->
    <div class="modal" id="event-modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <div class="modal-content">
        <button class="btn-close" id="modal-close" aria-label="Close">&#10005;</button>
        <span class="eyebrow" id="modal-eyebrow"></span>
        <h3 id="modal-title"></h3>
        <p class="modal-copy" id="modal-time"></p>
        <p id="modal-location"></p>
        <p id="modal-desc"></p>
        <div class="modal-actions">
          <a class="btn btn-primary" id="modal-gcal-link" href="#" target="_blank" rel="noopener">Add to Calendar</a>
        </div>
      </div>
    </div>

    <a href="../index.html" class="back-link" style="display:block; text-align:center; margin: 3rem auto 2rem;">← Back to Home</a>

  </main>

  <script src="../scripts/calendar.js"></script>
</body>
</html>
