<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Member Login - Soul School</title>
  <link rel="stylesheet" href="../styles/main.css">
</head>
<body>
  <main class="page-center">
    <section class="hero-card content-card">
      <h1>Member Login</h1>
      <p>Private access for Soul School members.</p>

      <form id="memberLoginForm" class="stacked-form">
        <label for="memberEmail">Email</label>
        <input id="memberEmail" name="memberEmail" type="email" autocomplete="email" required placeholder="you@example.com">

        <label for="memberPassword">Personal Password</label>
        <input id="memberPassword" name="memberPassword" type="password" autocomplete="current-password" required placeholder="Personal password">

        <p id="memberError" class="error-message" role="alert"></p>

        <button type="submit" class="btn btn-primary">Login</button>
      </form>

      <a class="btn btn-secondary" href="../index.html">Back to Home</a>
    </section>
  </main>

  <script src="../movement/main.js"></script>
</body>
</html>
