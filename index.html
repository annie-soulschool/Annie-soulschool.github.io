<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Soul School</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@300;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@300;400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap">
	<link rel="stylesheet" href="styles/main.css">
</head>
<body>
	<main class="page-center">
		<section class="hero-card">
			<img src="assets/SOUL-SCHOOL-HEADER-GOLD.png" alt="SOUL SCHOOL - the transmission of love and joy and liberation of all beings!" class="logo">
			<div class="button-group">
				<button id="enterSoulSchool" type="button" class="btn btn-primary">Enter Soul School</button>
				<a class="btn btn-secondary" href="/pages/what-is-soul-school.html">What is Soul School?</a>
				<a class="btn btn-secondary" href="/pages/member-login.html">Member Login</a>
			</div>
		</section>
	</main>

	<div id="passwordModal" class="modal" aria-hidden="true" role="dialog" aria-labelledby="modalTitle">
		<div class="modal-content">
			<button type="button" id="closeModal" class="btn-close" aria-label="Close">×</button>
            <h3 id="modalTitle">Enter Password</h3>
            <p class="modal-copy">What is the magical combination?</p>
            <form id="passwordForm">
                <label for="soulPassword" class="sr-only">Password</label>
                <input id="soulPassword" name="soulPassword" type="password" autocomplete="current-password" required placeholder="Password">
                <p id="passwordError" class="error-message" role="alert"></p>
                <div class="modal-actions">
                    <button type="submit" class="btn btn-primary">Enter</button>
                </div>
            </form>
        </div>
    </div>

	<script src="movement/main.js"></script>
</body>
</html>
